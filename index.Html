<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>スパキン育成</title>

<style>

body{
margin:0;
background:url("rouya.png") center/cover no-repeat;
height:100vh;
font-family:sans-serif;
color:white;
overflow:hidden;
}

#ui{
position:absolute;
top:20px;
left:20px;
font-size:22px;
}

.bar{
width:220px;
height:28px;
background:#333;
border-radius:14px;
overflow:hidden;
}

.fill{
height:100%;
background:#4caf50;
width:100%;
}

#spakin{
position:absolute;
width:220px;
left:50%;
top:60%;
transform:translate(-50%,-50%);
transition:2s linear;
}

#food{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:140px;
}

#explore{
position:absolute;
right:20px;
top:20px;
font-size:24px;
padding:10px 18px;
}

#battle{
display:none;
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
text-align:center;
}

.enemy{
position:absolute;
top:120px;
width:100%;
}

.player{
position:absolute;
bottom:120px;
width:100%;
}

.hpbar{
width:240px;
height:26px;
background:#333;
border-radius:13px;
margin:auto;
overflow:hidden;
}

.hp{
height:100%;
background:red;
width:100%;
}

#battleButtons{
position:absolute;
bottom:40px;
width:100%;
}

#log{
position:absolute;
bottom:10px;
width:100%;
font-size:24px;
}

button{
font-size:24px;
padding:10px 18px;
margin:8px;
}

</style>
</head>

<body>

<div id="ui">

スパキンLv <span id="lv">1</span><br>

空腹
<div class="bar">
<div id="hungerBar" class="fill"></div>
</div>

<img src="food.png" width="30"> <span id="foodCount">10</span><br>
<img src="money.png" width="30"> <span id="moneyCount">0</span>

</div>

<img id="spakin" src="spakin.png">

<img id="food" src="food.png" onclick="feed()">

<button id="explore" onclick="explore()">探索</button>

<div id="battle">

<div class="enemy">

<h2>きてぃ Lv <span id="enemyLv"></span></h2>

<div class="hpbar">
<div id="enemyHPbar" class="hp"></div>
</div>

<img src="kitty.png" width="220">

</div>

<div class="player">

<h2>スパキン</h2>

<div class="hpbar">
<div id="playerHPbar" class="hp"></div>
</div>

<img src="spakin.png" width="220">

</div>

<div id="battleButtons"></div>

<div id="log"></div>

</div>

<audio id="roomBgm" src="room1.mp3" loop></audio>
<audio id="battleBgm" src="battle1.mp3" loop></audio>

<script>

/* BGM管理 */

function playBGM(type){

let room=document.getElementById("roomBgm")
let battle=document.getElementById("battleBgm")

room.pause()
battle.pause()

room.currentTime=0
battle.currentTime=0

if(type==="room") room.play()
if(type==="battle") battle.play()

}

/* 最初のタップ */

document.body.addEventListener("click",()=>{

playBGM("room")

},{once:true})

/* 基本 */

let hunger=100
let foods=10
let money=0
let playerLv=1

let playerHP=100
let enemyHP=0
let enemyLv=1

let exploring=false

function updateUI(){

document.getElementById("hungerBar").style.width=hunger+"%"
document.getElementById("foodCount").textContent=foods
document.getElementById("moneyCount").textContent=money
document.getElementById("lv").textContent=playerLv

}

/* 空腹 */

setInterval(()=>{

hunger--

if(hunger<0) hunger=0

if(hunger===100 && playerHP<100){

playerHP+=5
if(playerHP>100) playerHP=100

}

updateUI()

},5000)

/* 餌 */

function feed(){

if(foods<=0)return

foods--
hunger+=20

if(hunger>100) hunger=100

updateUI()

}

/* スパキン移動 */

let spakin=document.getElementById("spakin")

setInterval(()=>{

let x=Math.random()*70+10
let y=Math.random()*70+10

spakin.style.left=x+"%"
spakin.style.top=y+"%"

},2500)

/* 探索 */

function explore(){

if(exploring)return

exploring=true

let btn=document.getElementById("explore")

btn.disabled=true

let t=20

let timer=setInterval(()=>{

t--

btn.textContent="探索中 "+t

if(t<=0){

clearInterval(timer)

btn.textContent="探索"

enemyLv=Math.floor(Math.random()*5)+1

alert("きてぃ Lv"+enemyLv+" が現れた！！！")

startBattle()

}

},1000)

}

/* 戦闘 */

function startBattle(){

document.getElementById("battle").style.display="block"

playerHP=100
enemyHP=80+(enemyLv*10)

document.getElementById("enemyLv").textContent=enemyLv

updateHP()

document.getElementById("battleButtons").innerHTML=
'<button onclick="startFight()">戦闘開始</button>'

}

function startFight(){

playBGM("battle")

document.getElementById("battleButtons").innerHTML=
'<button onclick="attack()">攻撃</button><button onclick="escape()">逃げる</button>'

}

function updateHP(){

document.getElementById("enemyHPbar").style.width=(enemyHP/(80+(enemyLv*10)))*100+"%"
document.getElementById("playerHPbar").style.width=(playerHP/100)*100+"%"

}

function attack(){

let dmg=10+(playerLv*2)

enemyHP-=dmg

document.getElementById("log").textContent="スパキンの攻撃！ "+dmg

updateHP()

if(enemyHP<=0){

win()
return

}

setTimeout(enemyTurn,1000)

}

function enemyTurn(){

let dmg=5+(enemyLv*2)

playerHP-=dmg

document.getElementById("log").textContent="きてぃの攻撃！ "+dmg

updateHP()

if(playerHP<=0){

lose()

}

}

function win(){

document.getElementById("log").textContent="きてぃを倒した！"

foods+=2
money+=10
playerLv++

setTimeout(endBattle,2000)

}

function lose(){

document.getElementById("log").textContent="スパキンは倒れた..."

setTimeout(endBattle,2000)

}

function escape(){

document.getElementById("log").textContent="逃げた！"

setTimeout(endBattle,1000)

}

function endBattle(){

document.getElementById("battle").style.display="none"

playBGM("room")

document.getElementById("explore").disabled=false

exploring=false

updateUI()

}

updateUI()

</script>

</body>
</html>
